version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netguard-backend
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host # Crucial for Scapy to see host traffic
    volumes:
      - ./backend/netguard.log:/app/netguard.log
      - ./backend/config.json:/app/config.json
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netguard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
